version: '3.8'

services:
  llamacpp:
    image: ghcr.io/ggerganov/llama.cpp:full
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: ["--host", "0.0.0.0", "--port", "8080", "--model", "/models/your-model.gguf"]  # Replace with actual model path
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  openwebui:
    image: ghcr.io/open-webui/open-webui:0.8.10
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://llamacpp:8080/v1
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      - llamacpp

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin  # Change this in production

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  dcgm-exporter:
    image: nvidia/dcgm-exporter:latest-3.3.5-ubuntu20.04
    ports:
      - "9400:9400"
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - DCGM_EXPORTER_LISTEN=0.0.0.0:9400

  unsloth-studio:
    image: unsloth/unsloth-studio:latest
    ports:
      - "3002:3000"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  openwebui_data:
  grafana_data:
  prometheus_data: