general:
  debug: false
  instance_name: "SearXNG"
  enable_metrics: true
  donation_url: false
  privacypolicy_url: false
  contact_url: false

ui:
  static_path: ""
  templates_path: ""
  default_theme: simple
  default_locale: ""
  theme_args:
    simple_style: auto

server:
  bind_address: "0.0.0.0"
  port: 8080
  base_url: false
  limiter: false
  public_instance: false
  secret_key: "change-me-in-production"
  method: "POST"
  image_proxy: false
  http_protocol_version: "1.0"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

search:
  safe_search: 0
  autocomplete: ""
  default_lang: ""
  formats:
    - html
    - json
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120

outgoing:
  enable: true
  request_timeout: 3.0

plugins: []

engines: []
